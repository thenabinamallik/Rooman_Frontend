    <form action="http://localhost:8080/loginform" method="post">
      <fieldset>
        <legend>Personal Details</legend>
        <label>Name:</label>
        <input
          type="text"
          name="name"
          placeholder="Enter your name"
          required
        /><br />

        <label>Email:</label>
        <input type="email" name="email" placeholder="Enter your email" /><br />

        <label>Password:</label>
        <input
          type="password"
          name="password"
          placeholder="Enter your password"
        /><br />

        <label>Mobile Number:</label>
        <input
          type="tel"
          name="mobile"
          placeholder="Enter your mobile number"
        /><br />

        <label>DOB:</label>
        <input type="date" name="dob" /><br />

        <label>Gender:</label>
        <input type="radio" name="gender" value="M" id="male" /><label
          for="male"
          >Male</label
        >
        <input type="radio" name="gender" value="F" id="female" /><label
          for="female"
          >Female</label
        ><br />

        <label>Skills:</label>
        <input type="checkbox" name="skills" value="Java" id="java" /><label
          for="java"
          >Java</label
        >
        <input type="checkbox" name="skills" value="Python" id="python" /><label
          for="python"
          >Python</label
        ><br />

        <label>Country:</label>
        <select name="country">
          <option value="ind">India</option>
          <option value="uae">Dubai</option></select
        ><br />

        <input type="submit" value="Submit" />
        <input type="reset" value="Reset" />
      </fieldset>
    </form>
